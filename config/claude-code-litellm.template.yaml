# LiteLLM Configuration for Claude Code -> Databricks
# This config accepts Anthropic API format and routes to Databricks-hosted Claude models
#
# Architecture:
#   Claude Code -> Filter Proxy (4001) -> LiteLLM (4010) -> Databricks
#
# Note: All model requests route to databricks-claude-opus-4-6 (only available endpoint).
# Update mappings when additional Databricks endpoints become available.

model_list:
  # Claude Opus 4.6 - Current model
  - model_name: claude-opus-4-6
    litellm_params:
      model: databricks/databricks-claude-opus-4-6
      api_key: ${WORKSPACE_API_TOKEN}
      api_base: https://${WORKSPACE_HOST}/serving-endpoints
      max_tokens: 16384

  # Claude Opus 4.6 - 1M context variant
  - model_name: claude-opus-4-6[1m]
    litellm_params:
      model: databricks/databricks-claude-opus-4-6
      api_key: ${WORKSPACE_API_TOKEN}
      api_base: https://${WORKSPACE_HOST}/serving-endpoints
      max_tokens: 16384

  # Claude Opus 4.5
