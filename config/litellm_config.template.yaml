model_list:
  - model_name: claude-sonnet-4
    litellm_params:
      model: databricks/databricks-claude-sonnet-4
      api_key: ${WORKSPACE_API_TOKEN}
      api_base: https://${WORKSPACE_HOST}/serving-endpoints
      max_tokens: 8192

litellm_settings:
  # drop_params: false - Keeps all parameters when making API calls instead of filtering them out
  drop_params: false
  # set_verbose: true - Enables detailed logging for debugging and monitoring API requests/responses
  set_verbose: true